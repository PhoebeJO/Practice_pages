<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Layer & Link Layer — Exam Trainer (Ch. 4–6)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Spline+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b131f; --panel:#121f2e; --panel2:#0e1825; --panelup:#16273a;
  --ink:#e7eef7; --muted:#8ba1b8; --faint:#5b7088;
  --line:#22344a; --line2:#2c4159;
  --teal:#5eead4; --teal-dim:#2dd4bf; --amber:#fbbf24;
  --green:#34d399; --red:#fb7185; --blue:#60a5fa; --violet:#c4b5fd;
  --shadow:0 18px 50px -20px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 700px at 78% -8%, rgba(94,234,212,.10), transparent 60%),
    radial-gradient(1000px 620px at 8% 108%, rgba(96,165,250,.10), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:'Spline Sans',system-ui,sans-serif;
  line-height:1.55; -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.wrap{max-width:880px;margin:0 auto;padding:28px 20px 90px}
a{color:var(--teal)}
code,.mono{font-family:'Spline Sans Mono',ui-monospace,monospace}

/* ---- header / hero ---- */
.kicker{font-family:'Spline Sans Mono',monospace;font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--teal-dim);margin:0 0 14px}
h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(30px,6vw,52px);line-height:1.02;letter-spacing:-.01em;margin:0 0 14px}
h1 .em{font-style:italic;color:var(--teal)}
.lead{color:var(--muted);font-size:17px;max-width:60ch;margin:0 0 26px}

.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow)}
.hero{position:relative;overflow:hidden}
.hero:before{content:"";position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:34px 34px;opacity:.08;pointer-events:none}

.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:22px 0}
@media(max-width:640px){.grid3{grid-template-columns:1fr}}
.chip{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px 14px}
.chip .n{font-family:'Fraunces',serif;font-size:13px;letter-spacing:.18em;color:var(--amber);text-transform:uppercase}
.chip .t{font-weight:600;margin:4px 0 4px}
.chip .d{color:var(--muted);font-size:13.5px}

ul.feat{list-style:none;padding:0;margin:18px 0 6px;display:grid;gap:9px}
ul.feat li{padding-left:26px;position:relative;color:var(--muted);font-size:14.5px}
ul.feat li:before{content:"";position:absolute;left:2px;top:9px;width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 3px rgba(94,234,212,.16)}
ul.feat li b{color:var(--ink);font-weight:600}

.note{font-size:13px;color:var(--faint);border-left:2px solid var(--line2);padding:4px 0 4px 14px;margin:18px 0 0}

/* ---- buttons ---- */
.btn{font-family:'Spline Sans',sans-serif;font-weight:600;font-size:15px;border:none;border-radius:12px;padding:13px 22px;cursor:pointer;transition:transform .12s ease,box-shadow .2s,background .2s;display:inline-flex;align-items:center;gap:9px}
.btn:active{transform:translateY(1px)}
.btn-primary{background:linear-gradient(135deg,var(--teal),var(--teal-dim));color:#06251f;box-shadow:0 10px 26px -10px rgba(94,234,212,.6)}
.btn-primary:hover{box-shadow:0 14px 30px -8px rgba(94,234,212,.75)}
.btn-ghost{background:var(--panelup);color:var(--ink);border:1px solid var(--line2)}
.btn-ghost:hover{border-color:var(--teal-dim);color:var(--teal)}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}

/* ---- mode selector ---- */
.modes{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:6px 0 4px}
@media(max-width:640px){.modes{grid-template-columns:1fr 1fr}}
.mode{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:14px;cursor:pointer;text-align:left;transition:.15s;color:var(--ink)}
.mode:hover{border-color:var(--teal-dim)}
.mode.sel{border-color:var(--teal);background:rgba(94,234,212,.08);box-shadow:inset 0 0 0 1px var(--teal)}
.mode .mt{font-weight:600}
.mode .ms{font-size:12.5px;color:var(--muted)}

/* ---- quiz ---- */
.topbar{position:sticky;top:0;z-index:30;backdrop-filter:blur(10px);background:rgba(11,19,31,.82);border-bottom:1px solid var(--line);margin:-28px -20px 22px;padding:14px 20px}
.topbar .row{max-width:880px;margin:0 auto;display:flex;align-items:center;gap:14px}
.progresswrap{flex:1;height:8px;background:var(--panel2);border-radius:99px;border:1px solid var(--line);overflow:hidden}
.progress{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--blue));transition:width .3s}
.counter{font-family:'Spline Sans Mono',monospace;font-size:13px;color:var(--muted);white-space:nowrap}
.btn-sm{padding:8px 13px;font-size:13px;border-radius:10px}

.qmeta{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.tag{font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:99px;border:1px solid var(--line2)}
.tag.ch4{color:var(--teal);border-color:rgba(94,234,212,.4)}
.tag.ch5{color:var(--amber);border-color:rgba(251,191,36,.4)}
.tag.ch6{color:var(--violet);border-color:rgba(196,181,253,.4)}
.tag.kind{color:var(--blue);border-color:rgba(96,165,250,.4)}
.qnum{font-family:'Spline Sans Mono',monospace;color:var(--faint);font-size:13px;margin-left:auto}

.qtext{font-size:18px;font-weight:500;margin:0 0 8px;line-height:1.5}
.qtext .mono{color:var(--amber);font-size:.95em}

.diagram{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px;margin:16px 0}
.diagram svg{display:block;width:100%;height:auto}
.diagram .cap{font-size:12px;color:var(--faint);font-family:'Spline Sans Mono',monospace;text-align:center;margin-top:8px}

.opts{display:grid;gap:10px;margin-top:18px}
.opt{display:flex;gap:13px;align-items:flex-start;background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:14px 15px;cursor:pointer;transition:.13s;text-align:left;color:var(--ink);font-size:15px;width:100%;font-family:inherit;line-height:1.45}
.opt:hover{border-color:var(--line2);background:var(--panelup)}
.opt .lk{flex:none;width:26px;height:26px;border-radius:8px;border:1px solid var(--line2);display:grid;place-items:center;font-family:'Spline Sans Mono',monospace;font-size:13px;color:var(--muted);font-weight:600}
.opt.sel{border-color:var(--teal);background:rgba(94,234,212,.09)}
.opt.sel .lk{background:var(--teal);color:#06251f;border-color:var(--teal)}
.opt.correct{border-color:var(--green);background:rgba(52,211,153,.12)}
.opt.correct .lk{background:var(--green);color:#05221a;border-color:var(--green)}
.opt.wrong{border-color:var(--red);background:rgba(251,113,133,.12)}
.opt.wrong .lk{background:var(--red);color:#2a0a12;border-color:var(--red)}
.opt[disabled]{cursor:default}

/* free response */
.frq textarea{width:100%;min-height:150px;background:var(--panel2);border:1px solid var(--line);border-radius:13px;color:var(--ink);font-family:'Spline Sans Mono',monospace;font-size:14px;padding:14px;resize:vertical;line-height:1.6}
.frq textarea:focus{outline:none;border-color:var(--teal-dim)}
.uploadrow{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:12px}
.upload-label{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;color:var(--muted);background:var(--panel2);border:1px dashed var(--line2);padding:10px 14px;border-radius:11px;cursor:pointer;transition:.15s}
.upload-label:hover{border-color:var(--teal-dim);color:var(--teal)}
.upload-label input{display:none}
.thumb{position:relative;display:inline-block}
.thumb img{max-height:84px;border-radius:9px;border:1px solid var(--line2);display:block}
.thumb .x{position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:13px;line-height:1}

.feedback{margin-top:16px;border-radius:14px;border:1px solid var(--line);overflow:hidden;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fb-head{display:flex;align-items:center;gap:12px;padding:13px 16px;font-weight:600}
.fb-head.correct{background:rgba(52,211,153,.14);color:var(--green)}
.fb-head.partial{background:rgba(251,191,36,.14);color:var(--amber)}
.fb-head.incorrect{background:rgba(251,113,133,.14);color:var(--red)}
.fb-score{margin-left:auto;font-family:'Spline Sans Mono',monospace;font-size:14px}
.fb-body{padding:6px 16px 16px;background:var(--panel2)}
.fb-body h5{margin:14px 0 7px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-family:'Spline Sans Mono',monospace;color:var(--faint)}
.fb-body ul{margin:0;padding-left:20px;display:grid;gap:6px}
.fb-body li{font-size:14.5px}
.fb-body li .corr{color:var(--green)}
.fb-body .err{font-size:14.5px;padding:9px 12px;border-radius:10px;background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.25);margin-bottom:7px}
.fb-body .err .mk{color:var(--red);font-weight:600}
.fb-body .err .fx{display:block;margin-top:4px;color:var(--green)}
.fb-summary{font-size:14.5px;color:var(--muted);margin-top:12px;border-top:1px solid var(--line);padding-top:12px}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.modelbox{margin-top:14px;border:1px solid var(--line);border-radius:13px;background:var(--panel2);overflow:hidden}
.modelbox summary{cursor:pointer;padding:13px 16px;font-weight:600;color:var(--teal);font-size:14.5px;list-style:none}
.modelbox summary::-webkit-details-marker{display:none}
.modelbox summary:before{content:"▸ ";color:var(--faint)}
.modelbox[open] summary:before{content:"▾ "}
.modelbox .mc{padding:0 16px 16px;white-space:pre-wrap;font-family:'Spline Sans Mono',monospace;font-size:13.5px;color:var(--ink);line-height:1.7}

.explain{margin-top:16px;background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.25);border-radius:13px;padding:14px 16px;font-size:14.5px;color:#cfe0f5}
.explain b{color:var(--blue)}

.navbtns{display:flex;justify-content:space-between;gap:12px;margin-top:26px}

/* palette */
.palette{display:flex;flex-wrap:wrap;gap:7px;margin-top:18px}
.pdot{width:34px;height:34px;border-radius:9px;border:1px solid var(--line2);background:var(--panel2);color:var(--muted);font-family:'Spline Sans Mono',monospace;font-size:12px;cursor:pointer;transition:.12s}
.pdot:hover{border-color:var(--teal-dim)}
.pdot.done{border-color:var(--teal);color:var(--teal)}
.pdot.cur{background:var(--teal);color:#06251f;border-color:var(--teal);font-weight:700}

/* results */
.score-hero{text-align:center;padding:34px 20px}
.score-ring{font-family:'Fraunces',serif;font-size:62px;font-weight:600;line-height:1}
.score-ring .pct{color:var(--teal)}
.score-sub{color:var(--muted);margin-top:8px}
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:22px 0}
@media(max-width:560px){.statgrid{grid-template-columns:1fr}}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:16px;text-align:center}
.stat .v{font-family:'Fraunces',serif;font-size:30px;font-weight:600}
.stat .l{font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--faint);font-family:'Spline Sans Mono',monospace;margin-top:4px}
.stat.ok .v{color:var(--green)} .stat.bad .v{color:var(--red)} .stat.frq .v{color:var(--amber)}

.section-h{font-family:'Fraunces',serif;font-size:22px;font-weight:600;margin:30px 0 6px}
.section-h .mono{font-size:14px;color:var(--faint)}
.review-q{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:16px 17px;margin-top:13px}
.review-q .yours{color:var(--red)} .review-q .right{color:var(--green)}
.review-q .lab{font-family:'Spline Sans Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-right:6px}

.empty-good{text-align:center;color:var(--green);padding:24px;font-size:15px}
.hide{display:none!important}
.center{text-align:center}
.fineprint{font-size:12px;color:var(--faint);text-align:center;margin-top:40px;font-family:'Spline Sans Mono',monospace}

/* ===== supplementary UI styles ===== */
.accent{color:var(--teal)}
.lede{font-size:17px;line-height:1.65;color:var(--muted);max-width:60ch;margin:18px 0 0}
.statline{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:22px;font-size:14px;color:var(--muted);font-family:'Spline Sans Mono',monospace}
.statline b{color:var(--ink)}
.dot{color:var(--faint)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px;margin-top:26px;box-shadow:var(--shadow)}
.panel-h{font-family:'Fraunces',serif;font-size:20px;color:var(--ink);margin-bottom:16px}
.modes{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.modecard{text-align:left;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;color:var(--ink);transition:.15s;display:flex;flex-direction:column;gap:8px}
.modecard:hover{border-color:var(--teal-dim);transform:translateY(-1px)}
.modecard.sel{border-color:var(--teal);background:rgba(94,234,212,.07);box-shadow:0 0 0 1px var(--teal) inset}
.modetop{display:flex;justify-content:space-between;align-items:center;gap:8px}
.modelabel{font-weight:600;font-size:15px}
.modecount{font-family:'Spline Sans Mono',monospace;font-size:12px;color:var(--teal);background:rgba(94,234,212,.1);padding:2px 8px;border-radius:20px;white-space:nowrap}
.modesub{font-size:13px;color:var(--muted);line-height:1.45}
.btn-primary.big{width:100%;padding:15px;font-size:16px}
.hint{font-size:13px;color:var(--faint);line-height:1.55;margin-top:16px}
.hint em{color:var(--muted)}
/* topbar / progress */
.progress-wrap{flex:1;min-width:0}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;font-family:'Spline Sans Mono',monospace;gap:10px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal-dim),var(--teal));border-radius:20px;transition:width .3s}
.link-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:6px 4px;white-space:nowrap}
.link-btn:hover{color:var(--teal)}
/* question card */
.qcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px;box-shadow:var(--shadow)}
.qnum{font-family:'Spline Sans Mono',monospace;font-size:13px;color:var(--teal);letter-spacing:.05em;margin-bottom:14px}
.qnum .of{color:var(--faint)}
.oletter{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,.06);font-family:'Spline Sans Mono',monospace;font-size:13px;flex:0 0 auto;margin-top:1px}
.opt.osel .oletter{background:var(--teal);color:#06231d}
.otext{flex:1}
/* frq */
.frq-input{width:100%;min-height:140px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;color:var(--ink);font-family:'Spline Sans Mono',monospace;font-size:14px;line-height:1.55;resize:vertical;box-sizing:border-box}
.frq-input:focus{outline:none;border-color:var(--teal-dim)}
.frq-tools{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-top:14px}
.upload-btn{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:14px;color:var(--ink)}
.upload-btn:hover{border-color:var(--teal-dim)}
.grade-btn{margin-left:auto}
.thumb-wrap{position:relative;display:inline-block}
.thumb{width:48px;height:48px;object-fit:cover;border-radius:8px;border:1px solid var(--line);display:block}
.thumb.big{width:auto;max-width:min(420px,100%);height:auto;max-height:360px}
.thumb-x{position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;border:none;background:var(--red);color:#3a0d16;font-size:12px;cursor:pointer;line-height:1}
/* feedback */
.fb{margin-top:18px;border-radius:14px;padding:18px;border:1px solid var(--line)}
.fb-warn{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.35)}
.fb-warn.small{padding:12px;font-size:14px}
.fb-graded{background:var(--panel2)}
.fb-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.verdict{font-family:'Spline Sans Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:.06em;padding:5px 12px;border-radius:20px}
.verdict.v-good{background:rgba(52,211,153,.14);color:var(--green)}
.verdict.v-mid{background:rgba(251,191,36,.14);color:var(--amber)}
.verdict.v-bad{background:rgba(251,113,133,.14);color:var(--red)}
.scorepill{font-family:'Spline Sans Mono',monospace;font-size:14px;font-weight:600;color:var(--ink);margin-left:auto;background:rgba(255,255,255,.05);padding:5px 12px;border-radius:20px}
.fb-sum{font-size:14px;color:var(--muted);line-height:1.55;margin:0 0 14px}
.fb-block{margin-top:12px}
.fb-label{font-family:'Spline Sans Mono',monospace;font-size:12px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.fb-label.good{color:var(--green)}
.fb-label.bad{color:var(--red)}
.fb-list{margin:0;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:8px}
.fb-list li{font-size:14px;line-height:1.5;padding-left:16px;position:relative}
.fb-list.good li::before{content:'';position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.fb-list.bad li{display:flex;flex-direction:column;gap:3px;padding-left:0}
.err-m{color:var(--ink)}
.err-c{color:var(--green);font-size:13px}
.good{color:var(--green)}
.modeldetails{margin-top:14px;font-size:14px}
.modeldetails summary{cursor:pointer;color:var(--teal);font-family:'Spline Sans Mono',monospace;font-size:13px;padding:6px 0}
/* nav row */
.navrow{display:flex;align-items:center;gap:14px;margin-top:20px;flex-wrap:wrap}
.navrow .palette{flex:1;justify-content:center}
/* results */
.results-hero{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:28px;box-shadow:var(--shadow)}
.score-row{display:flex;align-items:center;gap:28px;flex-wrap:wrap;margin-top:18px}
.score-inner{position:absolute;inset:12px;border-radius:50%;background:var(--panel);display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-pct{font-family:'Fraunces',serif;font-size:30px;color:var(--ink);line-height:1}
.score-stats{display:flex;gap:14px;flex-wrap:wrap}
.score-stats .stat{display:flex;flex-direction:column;min-width:64px}
.score-stats .stat b{font-family:'Fraunces',serif;font-size:26px}
.score-stats .stat span{font-size:12px;color:var(--muted);font-family:'Spline Sans Mono',monospace}
.stat.good b{color:var(--green)} .stat.bad b{color:var(--red)}
.stat.blank b{color:var(--faint)} .stat.frq b{color:var(--teal)}
.results-actions{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
.review-section{margin-top:30px}
.rev-h{font-family:'Fraunces',serif;font-size:24px;color:var(--ink);margin:0 0 6px}
.rev-intro{color:var(--muted);font-size:14px;margin:0 0 18px}
.allgood{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.35);border-radius:14px;padding:20px;color:var(--green);font-size:15px}
.rev-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px}
.rev-tag{font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--teal);margin-bottom:10px}
.rev-q{font-size:16px;line-height:1.55;color:var(--ink);margin-bottom:14px}
.diagram.small{max-width:440px;margin:0 0 14px}

const QUESTIONS = [
/* ---------------------- CHAPTER 4: DATA PLANE ---------------------- */
{id:'c4-1',ch:'ch4',type:'mcq',
 q:'In the network layer, what is the difference between <em>forwarding</em> and <em>routing</em>?',
 options:[
  'Forwarding is a network-wide process; routing is a purely local action at one router',
  'Forwarding is the local per-router action of moving a packet from an input link to the correct output link; routing is the network-wide process that determines the end-to-end paths',
  'They are two names for the same operation',
  'Forwarding happens in the control plane; routing happens in the data plane'],
 answer:1,
 explain:'Forwarding is a <strong>local</strong> data-plane action: when a packet arrives, the router moves it to the appropriate output port. Routing is a <strong>network-wide</strong> control-plane process that computes the paths packets take from source to destination.'},

{id:'c4-2',ch:'ch4',type:'mcq',
 q:'Which statement best describes the <em>data plane</em>?',
 options:[
  'The network-wide logic that determines how datagrams are routed end-to-end',
  'The per-router local function that determines how a datagram arriving on an input port is forwarded to an output port',
  'The protocol used by routers to exchange routing tables',
  'The management interface used by network operators'],
 answer:1,
 explain:'The data plane is the <strong>local, per-router</strong> function executed for every datagram, deciding the output port. The control plane is the network-wide path-determination logic.'},

{id:'c4-3',ch:'ch4',type:'mcq',
 q:'In the <em>SDN (software-defined networking)</em> approach to the control plane, where does the routing logic reside?',
 options:[
  'In each individual router, which runs a routing algorithm and communicates with peers',
  'In a remote (logically centralized) controller that computes and installs forwarding tables into the routers',
  'In the end hosts, which tell routers how to forward',
  'In the DNS servers'],
 answer:1,
 explain:'SDN separates control from data plane: a <strong>logically centralized remote controller</strong> computes forwarding tables and installs them in the (now simpler) switches. The traditional approach runs routing algorithms in each router.'},

{id:'c4-4',ch:'ch4',type:'mcq',
 q:'The Internet network layer provides which service model?',
 options:['Guaranteed bandwidth and bounded delay','Best-effort service (no guarantees on delivery, order, timing, or bandwidth)','Reliable, in-order delivery','Constant bit rate'],
 answer:1,
 explain:'IP offers a <strong>best-effort</strong> service: no guarantee of delivery, no guarantee of in-order delivery, no guarantee on delay or bandwidth. Reliability, if needed, is added by TCP at the transport layer.'},

{id:'c4-5',ch:'ch4',type:'mcq',
 q:'A forwarding table contains these entries. To which interface is a datagram with destination <strong>200.23.17.5</strong> forwarded?<br><code>200.23.16.0/23 → 0<br>200.23.18.0/23 → 1<br>200.23.16.0/20 → 2<br>otherwise → 3</code>',
 options:['Interface 0','Interface 1','Interface 2','Interface 3'],
 answer:0,
 explain:'Use <strong>longest-prefix matching</strong>. 200.23.17.5 → 200.23.16.0/23 matches (200.23.16.0–200.23.17.255) and so does the /20, but /23 is longer (more specific), so interface <strong>0</strong> wins.'},

{id:'c4-6',ch:'ch4',type:'mcq',
 q:'What hardware is commonly used to perform fast longest-prefix matching in line-rate routers?',
 options:['DRAM','TCAM (ternary content-addressable memory)','A spinning hard disk','SRAM cache only'],
 answer:1,
 explain:'<strong>TCAM</strong> returns an address in one clock cycle regardless of table size, and its "ternary" (0/1/don\'t-care) nature is ideal for prefix matching — perfect for line-rate longest-prefix lookups.'},

{id:'c4-7',ch:'ch4',type:'mcq',
 q:'Which of the following is <em>NOT</em> one of the three classic switching-fabric types in a router?',
 options:['Switching via memory','Switching via a bus','Switching via an interconnection network (crossbar)','Switching via DNS'],
 answer:3,
 explain:'The three switching-fabric types are via <strong>memory</strong>, via a <strong>bus</strong>, and via an <strong>interconnection network</strong> (e.g., crossbar). DNS is unrelated.'},

{id:'c4-8',ch:'ch4',type:'mcq',
 q:'Head-of-line (HOL) blocking occurs at which part of a router, and what causes it?',
 options:[
  'At output ports, caused by a full routing table',
  'At input ports, when a queued datagram at the head of the queue blocks others behind it from being switched even though their output ports are free',
  'At the control plane, caused by slow route computation',
  'In the link layer, caused by collisions'],
 answer:1,
 explain:'<strong>HOL blocking</strong> happens at <strong>input ports</strong>: the datagram at the front of the input queue waits for a busy output port, blocking the datagrams behind it that could otherwise be forwarded.'},

{id:'c4-9',ch:'ch4',type:'mcq',
 q:'Packet loss at a router most commonly occurs because:',
 options:[
  'The TTL field reaches zero',
  'Output-port buffers (queues) overflow when packets arrive faster than the link transmission rate',
  'The checksum fails',
  'The MAC address is unknown'],
 answer:1,
 explain:'When the arrival rate to an output port exceeds the link rate, the <strong>output buffer fills and overflows</strong>, and arriving packets are dropped. (TTL=0 causes discard too, but buffer overflow is the principal loss/congestion cause.)'},

{id:'c4-10',ch:'ch4',type:'mcq',
 q:'The classic "rule of thumb" for buffer sizing is RTT×C, but RFC 3439 argues that for a link with N TCP flows the buffer should be about:',
 options:['RTT×C × N','RTT×C / √N','RTT×C × √N','Independent of N'],
 answer:1,
 explain:'For a large number N of independent TCP flows, the recommended buffer is <strong>(RTT×C)/√N</strong> — much smaller than the single-flow RTT×C rule.'},

{id:'c4-11',ch:'ch4',type:'mcq',
 q:'In Explicit Congestion Notification (ECN) / RED, what does a router do as queues begin to build?',
 options:[
  'Immediately drops all incoming packets',
  'Marks packets (rather than dropping them) to signal congestion to the endpoints before the buffer is full',
  'Sends the packets back to the source',
  'Increases the link speed'],
 answer:1,
 explain:'With ECN/RED, the router <strong>marks</strong> packets to signal incipient congestion, letting endpoints slow down <em>before</em> the buffer overflows and forces drops.'},

{id:'c4-12',ch:'ch4',type:'mcq',
 q:'Under <em>Weighted Fair Queueing (WFQ)</em>, the bandwidth class i receives is proportional to:',
 options:[
  'Its arrival order (first come first served)',
  'Its weight divided by the sum of weights of all active classes: w<sub>i</sub> / Σw<sub>j</sub>',
  'The inverse of its packet size',
  'Always an equal 1/N share regardless of weight'],
 answer:1,
 explain:'WFQ generalizes round robin: each class i gets a guaranteed share <strong>w<sub>i</sub>/Σw<sub>j</sub></strong> of the link, providing a minimum bandwidth guarantee per class.'},

{id:'c4-13',ch:'ch4',type:'mcq',
